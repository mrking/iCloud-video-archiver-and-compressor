# Example configuration for archive-videos.
# Copy this file to ~/.config/icloud-archiver/archive-config.toml
# and fill in your values. Do NOT embed credentials in the file —
# use environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
# or AWS IAM roles instead.

[s3]
bucket = "my-glacier-archive"          # S3 bucket already created in your account
region = "us-east-1"                   # AWS region for S3 operations
prefix = "photos/"             # S3 key prefix
storage_class = "DEEP_ARCHIVE"          # GLACIER or DEEP_ARCHIVE

# ── Compression settings ────────────────────────────────────────────────────
# max_bitrate_mbps: set to a positive value (e.g. 20) to enforce a bitrate ceiling.
# Set to 0 or a negative value to disable the bitrate ceiling (CRF controls quality only).
# audio_bitrate: "copy" to preserve original audio, or "128k" / "256k" for re-encode
[compression]
codec = "hevc"          # "hevc" (H.265) or "h264" (H.264)
crf = 18                # 18=visually lossless (large), 28=smaller file (default: 23)
preset = "slow"         # slower = better compression; "slow" or "slower" for archivists
max_height = 1080       # 0 disables scaling; positive value scales to max height
max_bitrate_mbps = 0    # 0 disables bitrate ceiling (CRF controls quality only)
audio_bitrate = "copy"  # "copy" to preserve original audio, or "128k" / "256k"

# ── macOS Photos library ────────────────────────────────────────────────────
# library_path: set to your Photos library path, or null for system default
library_path = null

# temp_dir: temporary working directory for exports and compressed files
temp_dir = "/tmp/icloud-archiver"

# dry_run: if true, archive-config.toml controls dry-run mode (CLI --execute overrides)
dry_run = true

# log_level: DEBUG for verbose ffmpeg output
log_level = "INFO"